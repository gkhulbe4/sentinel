# Fly.io config for the API (public). Deploy from the repo root:
#   fly deploy --config apps/api/fly.toml .
app = "sentinel-api-v1"
primary_region = "iad"

[build]
dockerfile = "Dockerfile"

[http_service]
internal_port = 3001
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1

[[vm]]
size = "shared-cpu-1x"
memory = "512mb"
